# Namespace configuration
namespace: "bell-test"

# PersistentVolumeClaim configuration for dynamic provisioning
pvc:
  name: "nfs-dynamic-pvc"
  storage: "1Gi"
  storageClassName: "nfs-csi"  # Uses nfs-csi StorageClass for dynamic provisioning

# Pod configuration
pod:
  name: "nfs-dynamic-test-pod"
  image: "registry.access.redhat.com/ubi8/ubi:latest"
  mountPath: "/mnt/nfs"

# ServiceAccount configuration
serviceAccount:
  name: "nfs-sa"

# Dynamic NFS Provisioning
# - Uses nfs-csi StorageClass (must be pre-created by cluster admin)
# - PV is automatically created when PVC is created
# - No manual PV creation needed
# - Works with restricted pod security (no inline volume)
# - Automatic cleanup when PVC is deleted


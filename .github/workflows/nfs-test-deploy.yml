name: NFS Test Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'nfs-test-chart/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy
          - teardown
        default: 'deploy'

env:
  CHART_PATH: ./nfs-test-chart
  RELEASE_NAME: nfs-test

jobs:
  nfs-test:
    runs-on: oc-run
    permissions:
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Login to OpenShift
        run: |
          echo "Logging in to OpenShift..."
          if [ -z "${{ secrets.OPENSHIFT_TOKEN }}" ]; then
            echo "Error: OPENSHIFT_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.OPENSHIFT_SERVER }}" ]; then
            echo "Error: OPENSHIFT_SERVER secret is not set"
            exit 1
          fi
          
          oc login --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --server=${{ secrets.OPENSHIFT_SERVER }} \
            --insecure-skip-tls-verify=true
          oc project ${{ secrets.OPENSHIFT_PROJECT }}
          
          # Verify login
          oc whoami
          echo "✓ Successfully logged in to OpenShift"

      - name: Clean up existing resources (if any)
        if: github.event.inputs.action != 'teardown'
        run: |
          echo "Checking for existing resources..."
          
          # Delete pod if exists (CSI inline volume is cleaned up with pod)
          oc delete pod nfs-test-pod --ignore-not-found=true -n ${{ secrets.OPENSHIFT_PROJECT }}
          
          # Wait a moment for pod to be deleted
          sleep 3
          
          echo "✓ Cleanup completed"

      - name: Deploy NFS Test
        if: github.event.inputs.action != 'teardown'
        run: |
          echo "=== Deploying NFS Test Chart ==="
          
          # NOTE: SCC hostmount-anyuid must be granted by the Bell CaaS platform team
          # as a one-time request during namespace onboarding. Cluster-admin runs:
          # oc adm policy add-scc-to-user hostmount-anyuid -z nfs-sa -n <namespace>
          
          # Deploy Helm chart
          echo "Installing Helm chart..."
          helm upgrade --install ${{ env.RELEASE_NAME }} ${{ env.CHART_PATH }} \
            --set nfs.server=${{ secrets.NFS_SERVER_IP }} \
            --set namespace=${{ secrets.OPENSHIFT_PROJECT }} \
            --wait \
            --timeout=5m
          
          echo "✓ Helm chart deployed successfully"

      - name: Wait for Pod Ready
        if: github.event.inputs.action != 'teardown'
        run: |
          echo "Waiting for pod to be ready..."
          oc wait --for=condition=Ready pod/nfs-test-pod \
            -n ${{ secrets.OPENSHIFT_PROJECT }} \
            --timeout=300s
          echo "✓ Pod is ready"

      - name: Print Pod Logs
        if: github.event.inputs.action != 'teardown'
        run: |
          echo "=== Pod Logs ==="
          oc logs nfs-test-pod -n ${{ secrets.OPENSHIFT_PROJECT }}
          echo ""
          echo "=== Pod Status ==="
          oc get pod nfs-test-pod -n ${{ secrets.OPENSHIFT_PROJECT }} -o wide

      - name: Debug pod (on failure)
        if: failure()
        run: |
          echo "=== Debugging Failed Pod ==="
          echo "Pod list:"
          oc get pods -n ${{ secrets.OPENSHIFT_PROJECT }}
          echo ""
          echo "Pod description:"
          oc describe pod nfs-test-pod -n ${{ secrets.OPENSHIFT_PROJECT }} || true
          echo ""
          echo "Pod logs (last 100 lines):"
          oc logs nfs-test-pod -n ${{ secrets.OPENSHIFT_PROJECT }} --tail=100 || true

      - name: Teardown NFS Test
        if: github.event.inputs.action == 'teardown'
        run: |
          echo "=== Tearing Down NFS Test ==="
          
          # Uninstall Helm release
          echo "Uninstalling Helm release..."
          helm uninstall ${{ env.RELEASE_NAME }} -n ${{ secrets.OPENSHIFT_PROJECT }} || echo "Release not found"
          
          # Note: PV (ndex-nfs-pv) is managed by cluster admin and should not be deleted
          
          echo "✓ Teardown completed successfully"

      - name: Deployment Summary
        if: always() && github.event.inputs.action != 'teardown'
        run: |
          echo "=== Deployment Summary ==="
          echo "Namespace: ${{ secrets.OPENSHIFT_PROJECT }}"
          echo "Release: ${{ env.RELEASE_NAME }}"
          echo "NFS Server: ${{ secrets.NFS_SERVER_IP }}"
          echo ""
          echo "Resources:"
          oc get all,pv,pvc -n ${{ secrets.OPENSHIFT_PROJECT }} || true

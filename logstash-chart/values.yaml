# Logstash configuration
name: logstash
namespace: bell-test

# Replica configuration
replicaCount: 1

# Image configuration
image:
  repository: docker.elastic.co/logstash/logstash
  tag: "8.13.0"

# Elasticsearch connection
elasticsearchHosts: "http://elasticsearch:9200"

# Java options
javaOpts: "-Xms512m -Xmx512m"

# Service configuration
service:
  type: ClusterIP
  beatsPort: 5044
  httpPort: 9600

# Resource limits
resources:
  requests:
    memory: "1Gi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# Persistence configuration
persistence:
  accessModes:
    - ReadWriteOnce
  storageClass: nfs-csi
  size: 2Gi

# ServiceAccount configuration
serviceAccount:
  name: logstash-sa


name: Elasticsearch Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy
          - teardown
        default: 'deploy'

env:
  CHART_PATH: ./elasticsearch-chart
  RELEASE_NAME: elasticsearch

jobs:
  elasticsearch:
    runs-on: oc-run
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Login to OpenShift
        run: |
          echo "Logging in to OpenShift..."
          if [ -z "${{ secrets.OPENSHIFT_TOKEN }}" ]; then
            echo "Error: OPENSHIFT_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.OPENSHIFT_SERVER }}" ]; then
            echo "Error: OPENSHIFT_SERVER secret is not set"
            exit 1
          fi

          oc login --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --server=${{ secrets.OPENSHIFT_SERVER }} \
            --insecure-skip-tls-verify=true
          oc project bell-test

          oc whoami
          echo "✓ Successfully logged in to OpenShift"

      - name: Clean up existing resources
        if: github.event.inputs.action != 'teardown'
        run: |
          echo "Cleaning up existing Elasticsearch resources..."
          
          # Force delete Helm release secrets (handles stuck releases)
          echo "Checking for Helm release secrets..."
          oc get secrets -n bell-test -l owner=helm,name=elasticsearch -o name | xargs -r oc delete -n bell-test || true
          
          # Try to uninstall via Helm
          echo "Attempting Helm uninstall..."
          helm uninstall elasticsearch -n bell-test --wait --timeout=2m || true
          
          # Force delete any remaining resources
          echo "Force deleting remaining resources..."
          oc delete statefulset elasticsearch --ignore-not-found=true -n bell-test --grace-period=0 --force || true
          oc delete pod -l app=elasticsearch --ignore-not-found=true -n bell-test --grace-period=0 --force || true
          oc delete svc elasticsearch --ignore-not-found=true -n bell-test || true
          oc delete sa elasticsearch-sa --ignore-not-found=true -n bell-test || true
          
          echo "Waiting for cleanup to complete..."
          sleep 20
          echo "✓ Cleanup completed"

      - name: Deploy Elasticsearch
        if: github.event.inputs.action != 'teardown'
        run: |
          echo "=== Deploying Elasticsearch ==="

          helm upgrade --install ${{ env.RELEASE_NAME }} ${{ env.CHART_PATH }} \
            --set namespace=bell-test \
            --timeout=10m \
            --wait

          echo "✓ Elasticsearch deployed successfully"

      - name: Wait for Elasticsearch Ready
        if: github.event.inputs.action != 'teardown'
        run: |
          echo "Waiting for Elasticsearch StatefulSet to be ready..."
          oc rollout status statefulset/elasticsearch \
            -n bell-test \
            --timeout=300s
          echo "✓ StatefulSet is ready"
          
          echo "Waiting additional 60s for Elasticsearch to fully start..."
          sleep 60

      - name: Validate Elasticsearch
        if: github.event.inputs.action != 'teardown'
        run: |
          echo "=== Validating Elasticsearch ==="
          ES_POD=$(oc get pod -l app=elasticsearch -n bell-test -o jsonpath='{.items[0].metadata.name}')
          echo "Elasticsearch pod: $ES_POD"

          echo "Checking if Elasticsearch is responding..."
          for i in {1..30}; do
            if oc exec $ES_POD -n bell-test -- curl -s http://localhost:9200 > /dev/null 2>&1; then
              echo "✓ Elasticsearch is responding"
              break
            fi
            echo "Attempt $i/30: Waiting for Elasticsearch to respond..."
            sleep 10
          done

          echo "--- Cluster Health ---"
          oc exec $ES_POD -n bell-test -- \
            curl -s http://localhost:9200/_cluster/health?pretty || echo "Failed to get cluster health"

          echo "--- Node Info ---"
          oc exec $ES_POD -n bell-test -- \
            curl -s http://localhost:9200/_cat/nodes?v || echo "Failed to get node info"

          echo "✓ Elasticsearch validation complete"

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Debugging Elasticsearch ==="
          oc get pods -n bell-test -l app=elasticsearch
          echo ""
          echo "=== StatefulSet Description ==="
          oc describe statefulset elasticsearch -n bell-test || true
          echo ""
          echo "=== Pod Description ==="
          oc describe pod -l app=elasticsearch -n bell-test || true
          echo ""
          echo "=== Container Logs ==="
          oc logs -l app=elasticsearch -n bell-test --tail=100 --all-containers=true || true
          echo ""
          echo "=== Previous Container Logs (if crashed) ==="
          oc logs -l app=elasticsearch -n bell-test --previous --tail=100 || true
          echo ""
          echo "=== PVCs ==="
          oc get pvc -n bell-test || true
          echo ""
          echo "=== Recent Events ==="
          oc get events -n bell-test --sort-by='.lastTimestamp' | tail -30

      - name: Teardown Elasticsearch
        if: github.event.inputs.action == 'teardown'
        run: |
          echo "=== Tearing Down Elasticsearch ==="
          helm uninstall ${{ env.RELEASE_NAME }} -n bell-test || echo "Release not found"
          echo "✓ Teardown completed"
          echo "Note: PVCs retained - delete manually if data cleanup needed"
          echo "  oc delete pvc -l app=elasticsearch -n bell-test"

      - name: Deployment Summary
        if: always() && github.event.inputs.action != 'teardown'
        run: |
          echo "=== Elasticsearch Deployment Summary ==="
          echo "Namespace: bell-test"
          echo "Release: ${{ env.RELEASE_NAME }}"
          echo ""
          oc get statefulset,pod,svc,pvc \
            -l app=elasticsearch \
            -n bell-test || true

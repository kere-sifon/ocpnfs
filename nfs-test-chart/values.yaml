# NFS server configuration
nfs:
  server: ""  # Will be set from NFS_SERVER_IP secret
  path: "/exports/ndex/data"

# Namespace configuration
namespace: "bell-test"

# PersistentVolume configuration (must be pre-created by cluster admin)
pv:
  name: "ndex-nfs-pv"
  storage: "1Gi"
  reclaimPolicy: "Retain"
  selectorLabel: "ndex-nfs"  # Label to match pre-created PV

# PersistentVolumeClaim configuration
pvc:
  name: "nfs-pvc"
  storage: "1Gi"

# Pod configuration
pod:
  name: "nfs-test-pod"
  image: "registry.access.redhat.com/ubi8/ubi:latest"
  mountPath: "/mnt/nfs"

# ServiceAccount configuration
serviceAccount:
  name: "nfs-sa"


name: NFS Test Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'nfs-test-chart/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy
          - teardown
        default: 'deploy'

env:
  NAMESPACE: nfs-test
  CHART_PATH: ./nfs-test-chart
  RELEASE_NAME: nfs-test

jobs:
  nfs-test:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to OpenShift
        run: |
          oc login https://api.crc.testing:6443 \
            --username=kubeadmin \
            --password=${{ secrets.OCP_KUBEADMIN_PASSWORD }} \
            --insecure-skip-tls-verify=true
          echo "✓ Successfully logged in to OpenShift"

      - name: Deploy NFS Test
        if: github.event.inputs.action != 'teardown'
        run: |
          echo "=== Deploying NFS Test Chart ==="
          
          # Apply hostmount-anyuid SCC to service account
          echo "Applying hostmount-anyuid SCC to nfs-sa service account..."
          oc adm policy add-scc-to-user hostmount-anyuid -z nfs-sa -n ${{ env.NAMESPACE }} || true
          
          # Deploy Helm chart
          echo "Installing Helm chart..."
          helm upgrade --install ${{ env.RELEASE_NAME }} ${{ env.CHART_PATH }} \
            --set nfs.server=${{ secrets.NFS_SERVER_IP }} \
            --set namespace=${{ env.NAMESPACE }} \
            --wait \
            --timeout=5m \
            --create-namespace
          
          echo "✓ Helm chart deployed successfully"

      - name: Wait for Pod Ready
        if: github.event.inputs.action != 'teardown'
        run: |
          echo "Waiting for pod to be ready..."
          oc wait --for=condition=Ready pod/nfs-test-pod \
            -n ${{ env.NAMESPACE }} \
            --timeout=300s
          echo "✓ Pod is ready"

      - name: Print Pod Logs
        if: github.event.inputs.action != 'teardown'
        run: |
          echo "=== Pod Logs ==="
          oc logs nfs-test-pod -n ${{ env.NAMESPACE }}
          echo ""
          echo "=== Pod Status ==="
          oc get pod nfs-test-pod -n ${{ env.NAMESPACE }} -o wide

      - name: Teardown NFS Test
        if: github.event.inputs.action == 'teardown'
        run: |
          echo "=== Tearing Down NFS Test ==="
          
          # Uninstall Helm release
          echo "Uninstalling Helm release..."
          helm uninstall ${{ env.RELEASE_NAME }} -n ${{ env.NAMESPACE }} || echo "Release not found"
          
          # Delete PersistentVolume (cluster-scoped resource)
          echo "Deleting PersistentVolume..."
          oc delete pv nfs-pv --ignore-not-found=true
          
          # Delete namespace
          echo "Deleting namespace..."
          oc delete namespace ${{ env.NAMESPACE }} --ignore-not-found=true
          
          echo "✓ Teardown completed successfully"

      - name: Deployment Summary
        if: always() && github.event.inputs.action != 'teardown'
        run: |
          echo "=== Deployment Summary ==="
          echo "Namespace: ${{ env.NAMESPACE }}"
          echo "Release: ${{ env.RELEASE_NAME }}"
          echo "NFS Server: ${{ secrets.NFS_SERVER_IP }}"
          echo ""
          echo "Resources:"
          oc get all,pv,pvc -n ${{ env.NAMESPACE }} || true


apiVersion: v1
kind: Pod
metadata:
  name: {{ .Values.pod.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  serviceAccountName: {{ .Values.serviceAccount.name }}
  restartPolicy: Never
  containers:
  - name: nfs-test-csi
    image: {{ .Values.pod.image }}
    command:
    - /bin/bash
    - -c
    - |
      echo "=== NFS Mount Test Started ==="
      echo "Mount point: {{ .Values.pod.mountPath }}"
      
      # Diagnostic information
      echo "=== Pod User Information ==="
      id
      echo ""
      
      echo "=== Mount Information ==="
      mount | grep nfs || echo "No NFS mounts found"
      echo ""
      
      echo "=== Directory Permissions ==="
      ls -la {{ .Values.pod.mountPath }}
      echo ""
      
      echo "=== Testing write access ==="
      TEST_FILE="{{ .Values.pod.mountPath }}/test-$(date +%s).txt"
      if echo "Test data written at $(date)" > "$TEST_FILE" 2>&1; then
        echo "✓ Write test successful: $TEST_FILE"
        
        # Read test
        echo "=== Testing read access ==="
        if cat "$TEST_FILE" 2>&1; then
          echo "✓ Read test successful"
        else
          echo "✗ Read test failed"
        fi
        
        # Cleanup
        rm -f "$TEST_FILE" 2>/dev/null || true
      else
        echo "✗ Write test failed - Permission denied"
        echo "This is expected if NFS export or directory permissions need adjustment"
      fi
      
      echo ""
      echo "=== Final directory contents ==="
      ls -la {{ .Values.pod.mountPath }}
      
      echo ""
      echo "=== NFS Mount Test Completed ==="
      echo "Pod will sleep for 3600 seconds for debugging..."
      sleep 3600
    volumeMounts:
    - name: nfs-volume
      mountPath: {{ .Values.pod.mountPath }}
  volumes:
  - name: nfs-volume
    persistentVolumeClaim:
      claimName: {{ .Values.pvc.name }}


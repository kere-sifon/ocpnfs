# NFS server configuration
nfs:
  server: ""  # Will be set from NFS_SERVER_IP secret
  path: "/exports/ndex/data"

# Namespace configuration
namespace: "bell-test"

# Pod configuration
pod:
  name: "nfs-test-pod"
  image: "registry.access.redhat.com/ubi8/ubi:latest"
  mountPath: "/mnt/nfs"

# ServiceAccount configuration
serviceAccount:
  name: "nfs-sa"

# CSI inline volume configuration
# No PV or PVC needed - volume is created inline in the pod spec
# Requires nfs.csi.k8s.io CSI driver to be installed in the cluster

# Made with Bob

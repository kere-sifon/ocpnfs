name: Elasticsearch Deploy

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - deploy
          - teardown
        default: 'deploy'

env:
  CHART_PATH: ./elasticsearch-chart
  RELEASE_NAME: elasticsearch

jobs:
  elasticsearch:
    runs-on: oc-run
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Login to OpenShift
        run: |
          echo "Logging in to OpenShift..."
          if [ -z "${{ secrets.OPENSHIFT_TOKEN }}" ]; then
            echo "Error: OPENSHIFT_TOKEN secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.OPENSHIFT_SERVER }}" ]; then
            echo "Error: OPENSHIFT_SERVER secret is not set"
            exit 1
          fi

          oc login --token=${{ secrets.OPENSHIFT_TOKEN }} \
            --server=${{ secrets.OPENSHIFT_SERVER }} \
            --insecure-skip-tls-verify=true
          oc project ${{ secrets.OPENSHIFT_PROJECT }}

          oc whoami
          echo "✓ Successfully logged in to OpenShift"

      - name: Clean up existing resources
        if: github.event.inputs.action != 'teardown'
        run: |
          echo "Cleaning up existing Elasticsearch resources..."
          oc delete deployment elasticsearch --ignore-not-found=true -n ${{ secrets.OPENSHIFT_PROJECT }}
          sleep 5
          echo "✓ Cleanup completed"

      - name: Deploy Elasticsearch
        if: github.event.inputs.action != 'teardown'
        run: |
          echo "=== Deploying Elasticsearch ==="

          helm upgrade --install ${{ env.RELEASE_NAME }} ${{ env.CHART_PATH }} \
            --set namespace=${{ secrets.OPENSHIFT_PROJECT }} \
            --timeout=10m \
            --wait

          echo "✓ Elasticsearch deployed successfully"

      - name: Wait for Elasticsearch Ready
        if: github.event.inputs.action != 'teardown'
        run: |
          echo "Waiting for Elasticsearch to be ready..."
          oc rollout status deployment/elasticsearch \
            -n ${{ secrets.OPENSHIFT_PROJECT }} \
            --timeout=300s
          echo "✓ Elasticsearch is ready"

      - name: Validate Elasticsearch
        if: github.event.inputs.action != 'teardown'
        run: |
          echo "=== Validating Elasticsearch ==="
          ES_POD=$(oc get pod -l app=elasticsearch -n ${{ secrets.OPENSHIFT_PROJECT }} -o jsonpath='{.items[0].metadata.name}')
          echo "Elasticsearch pod: $ES_POD"

          echo "--- Cluster Health ---"
          oc exec $ES_POD -n ${{ secrets.OPENSHIFT_PROJECT }} -- \
            curl -s http://localhost:9200/_cluster/health?pretty

          echo "--- Node Info ---"
          oc exec $ES_POD -n ${{ secrets.OPENSHIFT_PROJECT }} -- \
            curl -s http://localhost:9200/_cat/nodes?v

          echo "✓ Elasticsearch validation complete"

      - name: Debug on failure
        if: failure()
        run: |
          echo "=== Debugging Elasticsearch ==="
          oc get pods -n ${{ secrets.OPENSHIFT_PROJECT }} -l app=elasticsearch
          echo ""
          oc describe deployment elasticsearch -n ${{ secrets.OPENSHIFT_PROJECT }} || true
          echo ""
          oc logs deployment/elasticsearch -n ${{ secrets.OPENSHIFT_PROJECT }} --tail=50 || true
          echo ""
          oc get pvc elasticsearch-pvc -n ${{ secrets.OPENSHIFT_PROJECT }} || true
          echo ""
          oc get events -n ${{ secrets.OPENSHIFT_PROJECT }} --sort-by='.lastTimestamp' | tail -20

      - name: Teardown Elasticsearch
        if: github.event.inputs.action == 'teardown'
        run: |
          echo "=== Tearing Down Elasticsearch ==="
          helm uninstall ${{ env.RELEASE_NAME }} -n ${{ secrets.OPENSHIFT_PROJECT }} || echo "Release not found"
          echo "✓ Teardown completed"
          echo "Note: elasticsearch-pvc retained - delete manually if data cleanup needed"
          echo "  oc delete pvc elasticsearch-pvc -n ${{ secrets.OPENSHIFT_PROJECT }}"

      - name: Deployment Summary
        if: always() && github.event.inputs.action != 'teardown'
        run: |
          echo "=== Elasticsearch Deployment Summary ==="
          echo "Namespace: ${{ secrets.OPENSHIFT_PROJECT }}"
          echo "Release: ${{ env.RELEASE_NAME }}"
          echo ""
          oc get deployment,pod,svc,pvc \
            -l app.kubernetes.io/instance=${{ env.RELEASE_NAME }} \
            -n ${{ secrets.OPENSHIFT_PROJECT }} || true

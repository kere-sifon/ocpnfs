# Kibana configuration
name: kibana
namespace: bell-test

# Replica configuration
replicaCount: 1

# Image configuration
image:
  repository: docker.elastic.co/kibana/kibana
  tag: "8.13.0"

# Elasticsearch connection
elasticsearchHosts: "http://elasticsearch:9200"

# Service configuration
service:
  type: ClusterIP
  port: 5601

# Resource limits
resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# Persistence configuration
persistence:
  accessModes:
    - ReadWriteOnce
  storageClass: nfs-csi
  size: 2Gi

# ServiceAccount configuration
serviceAccount:
  name: kibana-sa


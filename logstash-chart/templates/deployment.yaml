apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
      annotations:
        k8s.v1.cni.cncf.io/networks: '[]'
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: logstash
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 5044
          name: beats
        - containerPort: 9600
          name: http
        env:
        - name: ELASTICSEARCH_HOSTS
          value: {{ .Values.elasticsearchHosts }}
        - name: LS_JAVA_OPTS
          value: {{ .Values.javaOpts }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: config
          mountPath: /usr/share/logstash/pipeline
        - name: data
          mountPath: /usr/share/logstash/data
      volumes:
      - name: config
        configMap:
          name: {{ .Values.name }}-config
      - name: data
        persistentVolumeClaim:
          claimName: {{ .Values.name }}-pvc

